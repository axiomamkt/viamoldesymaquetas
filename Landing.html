<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vía Moldes y Maquetas — Landing</title>
<link rel="stylesheet" href="src/tokens.css">
<style>
  html, body, #root { height: 100%; margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: 'Inter', system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/design-canvas.jsx"></script>
<script type="text/babel" src="src/tweaks-panel.jsx"></script>
<script type="text/babel" src="src/SharedAssets.jsx"></script>
<script type="text/babel" src="src/QuoteModal.jsx"></script>
<script type="text/babel" src="src/DirectionA.jsx"></script>
<script type="text/babel" src="src/DirectionB.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "gold",
  "typography": "sans"
}/*EDITMODE-END*/;

const ACCENT_MAP = {
  gold:   { value: '#c9a557', label: 'Dorado' },
  steel:  { value: '#9aa3ad', label: 'Acero' },
  copper: { value: '#b56a3a', label: 'Cobre' },
};
const TYPE_MAP = {
  sans:  { display: '"Archivo", "Helvetica Neue", system-ui, sans-serif', label: 'Sans (Archivo)' },
  serif: { display: '"Fraunces", Georgia, serif', label: 'Serif (Fraunces)' },
  slab:  { display: '"Roboto Slab", Georgia, serif', label: 'Slab (Roboto Slab)' },
};

// Inject extra Google Fonts so tweaks can swap
(function () {
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800;9..144,900&family=Roboto+Slab:wght@400;500;600;700;800;900&display=swap';
  document.head.appendChild(link);
})();

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--vm-gold', ACCENT_MAP[t.accent]?.value || ACCENT_MAP.gold.value);
    root.style.setProperty('--vm-font-display', TYPE_MAP[t.typography]?.display || TYPE_MAP.sans.display);
  }, [t.accent, t.typography]);

  const accent = ACCENT_MAP[t.accent]?.value || ACCENT_MAP.gold.value;

  return (
    <DesignCanvas>
      <DCSection id="landings" title="Vía Moldes y Maquetas — Rediseño Landing"
        subtitle="Dos direcciones para una empresa industrial premium en León, Guanajuato. Click en ⛶ para fullscreen.">
        <DCArtboard id="dirA" label="A · Sobria · Retícula editorial" width={1320} height={900}>
          <DirectionA accent={accent} />
        </DCArtboard>
        <DCArtboard id="dirB" label="B · Dramática · Tipografía protagonista" width={1320} height={900}>
          <DirectionB accent={accent} />
        </DCArtboard>
      </DCSection>

      <TweaksPanel>
        <TweakSection label="Acento" />
        <TweakRadio label="Color" value={t.accent}
          options={[
            { value: 'gold',   label: 'Dorado' },
            { value: 'steel',  label: 'Acero' },
            { value: 'copper', label: 'Cobre' },
          ]}
          onChange={v => setTweak('accent', v)} />

        <TweakSection label="Tipografía display" />
        <TweakRadio label="Familia" value={t.typography}
          options={[
            { value: 'sans',  label: 'Sans' },
            { value: 'serif', label: 'Serif' },
            { value: 'slab',  label: 'Slab' },
          ]}
          onChange={v => setTweak('typography', v)} />

        <TweakSection label="Acciones" />
        <TweakButton label="Abrir Dir. A en fullscreen" onClick={() => {
          const evt = new CustomEvent('dc:focus', { detail: { id: 'dirA' } });
          // expand by clicking the artboard's expand button if available
          document.querySelectorAll('.dc-expand').forEach((b, i) => { if (i === 0) b.click(); });
        }} />
        <TweakButton label="Abrir Dir. B en fullscreen" onClick={() => {
          document.querySelectorAll('.dc-expand').forEach((b, i) => { if (i === 1) b.click(); });
        }} />
      </TweaksPanel>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
